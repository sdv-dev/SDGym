modality: single_table
datasets_single_table: &datasets_single_table
  - adult
  - alarm
  - census
  - child
  - covtype
  - expedia_hotel_logs
  - insurance
  - intrusion
  - news

exclusions:
  gan: &gan_exclude
    - covtype
    - intrusion
  realtabformer: &rtf_exclude
    - covtype
    - intrusion
    - expedia_hotel_logs
    - census

instance_jobs:
  - synthesizers: [ColumnSynthesizer, GaussianCopulaSynthesizer]
    datasets:
      include: *datasets_single_table

  - synthesizers: [TVAESynthesizer]
    datasets:
      include: *datasets_single_table

  - synthesizers: [SegmentSynthesizer]
    datasets:
      include: *datasets_single_table

  - synthesizers: [XGCSynthesizer]
    datasets:
      include: *datasets_single_table

  - synthesizers: [BootstrapSynthesizer]
    datasets:
      include: *datasets_single_table

  - synthesizers: [CTGANSynthesizer]
    datasets:
      include: *datasets_single_table
      exclude: *gan_exclude

  - synthesizers: [CopulaGANSynthesizer]
    datasets:
      include: *datasets_single_table
      exclude: *gan_exclude

  - synthesizers: [RealTabFormerSynthesizer]
    datasets:
      include: *datasets_single_table
      exclude: *rtf_exclude

  - synthesizers: [RealTabFormerSynthesizer]
    datasets:
      include: [covtype]

  - synthesizers: [RealTabFormerSynthesizer]
    datasets:
      include: [intrusion]

  - synthesizers: [RealTabFormerSynthesizer]
    datasets:
      include: [expedia_hotel_logs]

  - synthesizers: [RealTabFormerSynthesizer]
    datasets:
      include: [census]

  - synthesizers: [CTGANSynthesizer]
    datasets:
      include: [covtype]

  - synthesizers: [CopulaGANSynthesizer]
    datasets:
      include: [covtype]

  - synthesizers: [CTGANSynthesizer]
    datasets:
      include: [intrusion]

  - synthesizers: [CopulaGANSynthesizer]
    datasets:
      include: [intrusion]
name: _Run SDGym Benchmark

on:
  workflow_call:
    inputs:
      config_filepath:
        required: false
        type: string
      modality:
        required: false
        type: string
      datasets:
        required: false
        type: string
      synthesizers:
        required: false
        type: string
      num_instances:
        required: false
        type: string
        default: "1"
      output_destination:
        required: false
        type: string
      timeout:
        required: false
        type: string
    secrets:
      SDV_ENTERPRISE_USERNAME:
        required: true
      SDV_ENTERPRISE_LICENSE_KEY:
        required: true
      GCP_SERVICE_ACCOUNT_JSON:
        required: true
      GCP_PROJECT_ID:
        required: true
      GCP_ZONE:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  run-sdgym-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        env:
          USERNAME: ${{ secrets.SDV_ENTERPRISE_USERNAME }}
          LICENSE_KEY: ${{ secrets.SDV_ENTERPRISE_LICENSE_KEY }}
        run: |
          python -m venv venv
          source venv/bin/activate

          python -m pip install --upgrade pip
          python -m pip install sdv-installer
          python -c "
          from sdv_installer.installation.installer import install_packages
          install_packages(
              username='${USERNAME}',
              license_key='${LICENSE_KEY}',
          )
          "
          python -m pip install "sdgym[all] @ git+https://github.com/sdv-dev/SDGym.git@${{ github.ref_name }}"

          echo "VIRTUAL_ENV=$(pwd)/venv" >> $GITHUB_ENV
          echo "$(pwd)/venv/bin" >> $GITHUB_PATH

      - name: Validate inputs
        run: |
          if [ -n "${{ inputs.config_filepath }}" ] && \
             { [ -n "${{ inputs.modality }}" ] || \
               [ -n "${{ inputs.datasets }}" ] || \
               [ -n "${{ inputs.synthesizers }}" ] || \
               [ -n "${{ inputs.output_destination }}" ] || \
               [ -n "${{ inputs.timeout }}" ] || \
               [ "${{ inputs.num_instances }}" != "1" ]; }; then
            echo "config_filepath cannot be combined with manual benchmark inputs."
            exit 1
          fi

          if [ -z "${{ inputs.config_filepath }}" ] && [ -z "${{ inputs.modality }}" ]; then
            echo "modality is required when config_filepath is not provided."
            exit 1
          fi

      - name: Run SDGym Benchmark from config
        if: ${{ inputs.config_filepath != '' }}
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
          SDV_ENTERPRISE_USERNAME: ${{ secrets.SDV_ENTERPRISE_USERNAME }}
          SDV_ENTERPRISE_LICENSE_KEY: ${{ secrets.SDV_ENTERPRISE_LICENSE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: |
          invoke launch-benchmark \
            --config-filepath "${{ inputs.config_filepath }}"

      - name: Run SDGym Benchmark from manual inputs
        if: ${{ inputs.config_filepath == '' }}
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
          SDV_ENTERPRISE_USERNAME: ${{ secrets.SDV_ENTERPRISE_USERNAME }}
          SDV_ENTERPRISE_LICENSE_KEY: ${{ secrets.SDV_ENTERPRISE_LICENSE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: |
          CMD="invoke launch-benchmark --modality '${{ inputs.modality }}'"

          if [ -n "${{ inputs.datasets }}" ]; then
            CMD="$CMD --datasets '${{ inputs.datasets }}'"
          fi

          if [ -n "${{ inputs.synthesizers }}" ]; then
            CMD="$CMD --synthesizers '${{ inputs.synthesizers }}'"
          fi

          if [ -n "${{ inputs.output_destination }}" ]; then
            CMD="$CMD --output-destination '${{ inputs.output_destination }}'"
          fi

          if [ -n "${{ inputs.timeout }}" ]; then
            CMD="$CMD --timeout '${{ inputs.timeout }}'"
          fi

          if [ -n "${{ inputs.num_instances }}" ]; then
            CMD="$CMD --num-instances '${{ inputs.num_instances }}'"
          fi

          eval "$CMD"